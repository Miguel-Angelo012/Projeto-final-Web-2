{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Clínica PetShop</title>
    <link rel="stylesheet" href="../static/consultas.css">
</head>


<header>

    <h1>🐶 Clínica PetShop</h1>

    <nav>
        <a href="{% url 'inicio' %}">
            <button>Inicio</button>
        </a> |
        <a href="{% url 'cadastro' %}">
            <button>Cadastrar nova consulta</button>
        </a> |
        <a href="{% url 'horarios' %}">
            <button>Horarios</button>
        </a>
        <a href="{% url 'login_consultas' %}">
            <button>Consultas Agendadas</button>
        </a>
        

    </nav>

</header>

<body>

<h1>Consultas Agendadas</h1>

<table border="1">

    <tr>
        <th>Pet</th>
        <th>Dono</th>
        <th>Atendimento</th>
        <th>Horário</th>
    </tr>

    {% for c in consultas %}

    <tr>
        <td>{{ c.nome_pet }}</td>
        <td>{{ c.nome_dono }}</td>
        <td>{{ c.atendimento }}</td>
        <td>{{ c.horario }}</td>
    </tr>

    {% endfor %}

</table>

</body>


</html>
