<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Consultas</title>
</head>
<body>

<h1>🔐 Ver Minhas Consultas</h1>

<form method="POST">
    {% csrf_token %}

    <label>Email:</label>
    <input type="email" name="email" required>
    <br><br>

    <label>Senha:</label>
    <input type="password" name="senha" required>
    <br><br>

    <button type="submit">Entrar</button>


</form>

  <a href="{% url 'inicio' %}"><button>Voltar</button></a>

{% if erro %}
    <p style="color:red;">{{ erro }}</p>
{% endif %}

</body>
</html>
